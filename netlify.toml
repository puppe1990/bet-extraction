[build]
  command = "vite build"
  dir = "dist/client"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"
  included_files = ["dist/server/**", "node_modules/drizzle-orm/**", "node_modules/@libsql/client/**"]
  external_node_modules = ["drizzle-orm", "@libsql/client"]

[dev]
  command = "pnpm dev"
  targetPort = 3000
  port = 8888
