version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@9.15.3
        - pnpm config set store-dir .pnpm-store
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm build
        - node scripts/build-amplify-bundle.mjs
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .pnpm-store/**/*
